services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: vaulta_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  web:
    image: nginx:latest
    container_name: vaulta_web
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.4
    container_name: vaulta_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: vaulta
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: vaulta
    ports:
      - "3307:3306"
    volumes:
      - vaulta_db_data:/var/lib/mysql

  node:
    image: node:22
    container_name: vaulta_node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "5173:5173"
    command: sh -c "tail -f /dev/null"

volumes:
  vaulta_db_data:
